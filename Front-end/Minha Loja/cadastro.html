<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="Felipe" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/cadastro.css">
    <title>Cadastro</title>
</head>

<body>
    <form action="" autocomplete="off" class="cadastro" id="cadastroForm">
        <fieldset>
            <legend>Cadastro</legend>
            <br>
            <label for="name" class="input-info">Nome:</label>
            <input type="text" name="name" id="name" required placeholder="Digite seu nome completo">
            <br>
            <br>
            <label for="email" class="input-info">Email:</label>
            <input type="email" name="email" id="email" required placeholder="Digite seu email">
            <br>
            <br>

            <label for="password" class="input-info">Senha:</label>
            <div class="password_wrapper">
            <input type="password" name="password" id="password" required placeholder="Crie uma senha" minlength="7">
            <span class="toggle_password" id="togglepassword">
            <svg class="icon_eye" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewbox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
            </svg>

            <svg class="icon_eye_off" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a18.6 18.6 0 0 1 5.06-5.94M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a18.6 18.6 0 0 1-2.16 3.19M14.12 14.12a3 3 0 1 1-4.24-4.24"/> 
            <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
            </span>
            </div>
            <br>
            <br>
            <label for="ispassword" class="input-info">Confirmar senha:</label>
            <input type="ispassword" name="ispassword" id="ispassword" required placeholder="Confirme sua senha" minlength="7">
            <br>
            <br>
            
            <label for="tel" class="input-info" >Telefone:</label>
            <input type="tel" name="tel" id="tel" required placeholder="Informe seu número">

            <div class="form_action">
                <input type="submit" value="Cadastro" class="bnt-primary">

                <p>Já tem um login?<a href="login.html" class="create_account">Login</a></p>
            </div>
        </fieldset>
    </form>
</body>
</html>
