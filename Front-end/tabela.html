<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    tfoot, td{
        text-align: center;
    }
</style>
<body> 
<center>
    <table border="4">
   
        <thead>
            <tr>
                <th>Produto</th>
                <th>Nome</th>
                <th>Preço</th>
                <th>Estoque</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td rowspan="3" class="pc">PC</td>
                <td>Asus</td>
                <td>R$5000,00</td>  
                <td>15</td>
            </tr>

            <tr>
                <td>Mec</td>
                <td>R$10.000,00</td>
                <td>3</td>
            </tr>

            <tr>
                <td>Positivo</td>
                <td>R$2000,00</td>
                <td>7</td>
            </tr>

            <tr>
                <td rowspan="3">Cell</td>
                <td>Samsung</td>
                <td>R$2000,00</td>
                <td>20</td>
            </tr>

            <tr>
                <td>Iphone</td>
                <td>R$7.000,00</td>
                <td>10</td>
            </tr>

            <tr>
                <td>Xiaomi</td>
                <td>R$2.500,00</td>
                <td>12</td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <td colspan="2">Total</td>
                <td>R$28.500,00</td>
                <td>67</td>
            </tr>
        </tfoot>
    </table>
</center>
</body>
</html>
